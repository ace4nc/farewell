<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Velvet Hour</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
margin: 0;
padding: 0;
background: #000;
color: #fff;
font-family: 'Montserrat', sans-serif;
overflow-x: hidden;
}

/* =======================
   INTRO
======================= */

#wrap {
position: relative;
z-index: 10;
transition: 2.2s ease;
opacity: 1;
}

#content {
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
flex-direction: column;
text-align: center;
}

#text {
font-size: 1.2rem;
opacity: 0.8;
letter-spacing: 2px;
}

#nameArea {
margin-top: 20px;
}

#input {
background: transparent;
border: none;
border-bottom: 1px solid rgba(255,255,255,0.3);
color: white;
outline: none;
text-align: center;
font-size: 1rem;
margin-top: 10px;
}

.cursor {
display: inline-block;
width: 8px;
height: 20px;
background: white;
margin-left: 5px;
animation: blink 1s infinite;
}

@keyframes blink {
50% { opacity: 0; }
}

/* =======================
   HERO
======================= */

#hero {
position: fixed;
inset: 0;
display: flex;
justify-content: center;
align-items: center;
opacity: 0;
visibility: hidden;
transition: 2.5s ease;
z-index: 25;
background: radial-gradient(circle at center, rgba(40,20,20,.3), #000);
}

#hero.show {
opacity: 1;
visibility: visible;
}

.hero-content {
text-align: center;
width: 100%;
max-width: 1200px;
}

.farewell-title {
font-size: clamp(3.5rem, 14vw, 11rem);
letter-spacing: 0.04em;
color: #f8f3ea;
}

.class-title {
margin-top: 15px;
letter-spacing: 0.6em;
color: #b89b5f;
}

#countdown {
margin-top: 50px;
display: flex;
justify-content: center;
gap: 15px;
flex-wrap: wrap;
}

.count-card {
width: 90px;
height: 110px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
border: 1px solid rgba(201,164,92,.35);
background: rgba(20,20,20,.9);
}

.count-card span {
font-size: 2rem;
}

.count-card small {
font-size: .6rem;
letter-spacing: .2em;
color: #c9a45c;
margin-top: 6px;
}

.date-note {
margin-top: 35px;
font-size: .8rem;
opacity: .7;
letter-spacing: .2em;
}

@media(max-width:768px){
.count-card {
width: 80px;
height: 100px;
}
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="wrap">

<div id="content">

<div id="text"></div>

<div id="nameArea">

<div>
<span id="typed"></span>
<span class="cursor"></span>
</div>

<input id="input" type="text" autocomplete="off">

</div>

</div>

</div>

<!-- HERO -->
<section id="hero">

<div class="hero-content">

<h1 class="farewell-title">FAREWELL</h1>

<div class="class-title">CLASS OF 2026</div>

<div id="countdown">

<div class="count-card"><span id="days">00</span><small>DAYS</small></div>
<div class="count-card"><span id="hours">00</span><small>HOURS</small></div>
<div class="count-card"><span id="minutes">00</span><small>MINS</small></div>
<div class="count-card"><span id="seconds">00</span><small>SECS</small></div>

</div>

<div class="date-note">
<div>AUGUST 2026</div>
<div>09.08.26*</div>
<div>*subject to change</div>
</div>

</div>

</section>

<script>

document.addEventListener("DOMContentLoaded", () => {

const hero = document.getElementById("hero");
const wrap = document.getElementById("wrap");
const input = document.getElementById("input");
const text = document.getElementById("text");

const targetDate = new Date("August 9, 2026 18:00:00");

/* =======================
   COUNTDOWN
======================= */

function updateCountdown(){

const now = new Date();
const diff = targetDate - now;

if(diff < 0) return;

document.getElementById("days").textContent =
Math.floor(diff / (1000*60*60*24));

document.getElementById("hours").textContent =
Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

document.getElementById("minutes").textContent =
Math.floor((diff % (1000*60*60)) / (1000*60));

document.getElementById("seconds").textContent =
Math.floor((diff % (1000*60)) / 1000);

}

updateCountdown();
setInterval(updateCountdown, 1000);

/* =======================
   TRANSITION
======================= */

function transitionToHero(){

wrap.style.transition = "2.2s ease";
wrap.style.opacity = "0";
wrap.style.filter = "blur(6px)";
wrap.style.transform = "scale(1.02)";

setTimeout(() => {
hero.classList.add("show");
}, 2200);

}

/* expose globally */
window.transitionToHero = transitionToHero;

/* =======================
   SIMPLE INTRO LOGIC (SAFE VERSION)
======================= */

text.innerText = "An invitation was issued.";

input.addEventListener("keydown", function(e){

if(e.key === "Enter"){

const name = input.value || "Guest";

text.innerText = "Welcome, " + name;

setTimeout(() => {

transitionToHero();

}, 1500);

}

});

});

</script>

</body>
</html>
