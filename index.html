<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Velvet Hour</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
font-family:'Cinzel',serif;
color:#f5f1e8;
}

/* BACKGROUND */

#bg{
position:fixed;
inset:0;
background:#000;
overflow:hidden;
z-index:1;
}

/* SMOKE */

.smoke{
position:absolute;
width:200%;
height:200%;
left:-50%;
top:-50%;
opacity:0;

background:
radial-gradient(circle at 30% 40%,
rgba(255,255,255,.05),
transparent 40%),

radial-gradient(circle at 70% 60%,
rgba(255,255,255,.04),
transparent 40%);

animation:
smokeReveal 8s forwards,
smokeMove 25s infinite ease-in-out;
}

@keyframes smokeReveal{
from{opacity:0;}
to{opacity:1;}
}

@keyframes smokeMove{
0%{transform:translate(0,0);}
50%{transform:translate(40px,-30px);}
100%{transform:translate(0,0);}
}

/* MASK */

#mask{
position:fixed;
left:50%;
top:40%;
transform:translate(-50%,-50%);
width:min(90vw,900px);
opacity:0;
transition:4s ease;
z-index:20;

filter:
brightness(1.2)
contrast(1.3)
drop-shadow(0 0 20px rgba(255,255,255,.2))
drop-shadow(0 0 60px rgba(255,255,255,.05));
}

#mask.show{
opacity:.18;
}

#mask.bright{
opacity:.9;
}

/* CONTENT */

#wrap{
position:relative;
z-index:30;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;
text-align:center;

transition:2s ease;
}

#content{
max-width:800px;
width:100%;
}

#text{
font-size:clamp(1.4rem,4vw,2.5rem);
letter-spacing:.08em;
line-height:1.8;
opacity:0;
transition:2s;
min-height:200px;
}

#text.show{
opacity:1;
}

/* NAME */

#nameArea{
opacity:0;
transition:2s;
margin-top:30px;
}

#nameArea.show{
opacity:1;
}

#typed{
font-family:'Montserrat',sans-serif;
font-size:1.6rem;
color:#d4d0c7;
letter-spacing:.15em;
}

.cursor{
display:inline-block;
width:2px;
height:1em;
background:#d4d0c7;
animation:blink 1s infinite;
margin-left:4px;
}

@keyframes blink{
50%{
opacity:0;
}
}

#input{
position:absolute;
opacity:0;
pointer-events:none;
}

/* LIGHT SWEEP */

#light{
position:fixed;
left:-100%;
top:0;
width:40%;
height:100%;
z-index:40;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
transparent
);

transform:skewX(-25deg);
}

/* HERO PAGE */

#hero{
position:fixed;
inset:0;

display:none;
justify-content:center;
align-items:center;
text-align:center;

padding:40px;

background:
radial-gradient(
circle at center,
rgba(5,5,5,.4) 0%,
rgba(0,0,0,.85) 100%
);

z-index:50;

opacity:0;
transition:2.5s ease;
}

.hero-inner{
width:100%;
max-width:1100px;
}

.title{
font-size:clamp(3rem,10vw,8rem);
letter-spacing:.06em;
margin-bottom:10px;
}

.subtitle{
font-family:'Montserrat',sans-serif;
letter-spacing:.3em;
opacity:.7;
margin-bottom:40px;
}

/* COUNTDOWN */

.countdown{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.card{
width:90px;
height:110px;

background:
linear-gradient(
180deg,
#141414,
#050505
);

border:1px solid rgba(201,164,92,.4);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

border-radius:14px;
}

.card span{
font-size:2rem;
}

.card small{
font-size:.65rem;
letter-spacing:.2em;
opacity:.7;
margin-top:5px;
}

.note{
margin-top:35px;
font-size:.8rem;
opacity:.5;
letter-spacing:.2em;
}

/* FALLING CARDS */

#cardContainer{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;

perspective:1200px;
overflow:hidden;
transform-style:flat;
}

.falling-card{
position:absolute;

width:75px;
height:105px;

background:#fff;

border-radius:6px;

box-shadow:
0 12px 30px rgba(0,0,0,.6);

display:flex;
justify-content:center;
align-items:center;

font-family:sans-serif;
font-weight:bold;

user-select:none;
will-change:transform;

animation:
fallLinear linear infinite;
}

.card-suit{
font-size:30px;
position:absolute;
}

.card-corner{
position:absolute;
font-size:12px;
line-height:1;

display:flex;
flex-direction:column;
align-items:center;
}

.corner-top{
top:6px;
left:6px;
}

.corner-bottom{
bottom:6px;
right:6px;
transform:rotate(180deg);
}

@keyframes fallLinear{

0%{
transform:
translate3d(
var(--x-start),
-150px,
var(--z-depth)
)
rotateX(0deg)
rotateY(0deg)
rotateZ(var(--r-start));
}

100%{
transform:
translate3d(
var(--x-end),
105vh,
var(--z-depth)
)
rotateX(var(--rot-x))
rotateY(var(--rot-y))
rotateZ(var(--rot-z));
}

}

  /* ========================= */
/* MOBILE OPTIMIZATION       */
/* ========================= */

@media (max-width:768px){

#wrap{
z-index:100;
}

#mask{
width:92vw;
top:32%;
}

#text{
font-size:1.4rem;
line-height:1.7;
padding:0 10px;
}

#typed{
font-size:1.2rem;
}

.title{
font-size:4.5rem;
line-height:.9;
}

.subtitle{
font-size:.8rem;
letter-spacing:.2em;
}

.hero-inner{
transform:translateY(-30px);
}

.countdown{
gap:10px;
}

.card{
width:20vw;
height:85px;
}

.card span{
font-size:1.5rem;
}

.note{
font-size:.7rem;
}

.falling-card{
width:42px;
height:58px;
}

}
</style>
</head>

<body>
  <div id="bg">

    <div class="smoke"></div>

    <img src="mask.png" id="mask">

    <div id="light"></div>

    <!-- Falling Cards Layer -->
    <div id="cardContainer"></div>

</div>

<!-- INTRO SCREEN -->

<div id="wrap">

    <div id="content">

        <div id="text"></div>

        <div id="nameArea">

            <div>
                <span id="typed"></span>
                <span class="cursor"></span>
            </div>

            <input
                id="input"
                type="text"
                autocomplete="off">

        </div>

    </div>

</div>

<!-- SECOND PAGE -->

<div id="hero">

    <div class="hero-inner">

        <div class="title">
            FAREWELL
        </div>

        <div class="subtitle">
            CLASS OF 2026
        </div>

        <div class="countdown">

            <div class="card">
                <span id="d">00</span>
                <small>DAYS</small>
            </div>

            <div class="card">
                <span id="h">00</span>
                <small>HOURS</small>
            </div>

            <div class="card">
                <span id="m">00</span>
                <small>MINS</small>
            </div>

            <div class="card">
                <span id="s">00</span>
                <small>SECS</small>
            </div>

        </div>

        <div class="note">
            AUGUST 9
        </div>

    </div>

</div>

<script>
  const text =
document.getElementById("text");

const input =
document.getElementById("input");

const typed =
document.getElementById("typed");

const nameArea =
document.getElementById("nameArea");

const mask =
document.getElementById("mask");

const light =
document.getElementById("light");

const hero =
document.getElementById("hero");

/* COUNTDOWN */

const target =
new Date("August 9, 2026 00:00:00");

function updateCountdown(){

const now =
new Date();

const diff =
target - now;

const d =
Math.floor(diff/(1000*60*60*24));

const h =
Math.floor(
(diff%(1000*60*60*24))
/
(1000*60*60)
);

const m =
Math.floor(
(diff%(1000*60*60))
/
(1000*60)
);

const s =
Math.floor(
(diff%(1000*60))
/
1000
);

document.getElementById("d").textContent =
String(d).padStart(2,"0");

document.getElementById("h").textContent =
String(h).padStart(2,"0");

document.getElementById("m").textContent =
String(m).padStart(2,"0");

document.getElementById("s").textContent =
String(s).padStart(2,"0");

}

/* ORIGINAL FUNCTIONS */

function sleep(ms){
return new Promise(
resolve =>
setTimeout(resolve,ms)
);
}

async function showLine(
message,
time
){

text.innerHTML =
message;

text.classList.add(
"show"
);

await sleep(time);

text.classList.remove(
"show"
);

await sleep(2500);
}

async function reveal(
message
){

text.innerHTML =
message;

text.classList.add(
"show"
);

await sleep(4500);

text.classList.remove(
"show"
);

await sleep(1200);
}

/* INTRO */

async function intro(){

await sleep(5000);

await showLine(
"An invitation was issued.",
7000
);

await showLine(
"Whether it reached the right hands remains to be seen.",
8000
);

mask.classList.add(
"show"
);

text.innerHTML =
"Who are you?";

text.classList.add(
"show"
);

nameArea.classList.add(
"show"
);

input.focus();

}

intro();

/* INPUT */

document.addEventListener(
"click",
()=>{
input.focus();
}
);

input.addEventListener(
"input",
()=>{
typed.textContent =
input.value;
}
);

/* ENTER */

input.addEventListener(
"keydown",
async e=>{

if(e.key==="Enter"){

const name =
input.value.trim();

if(!name)return;

/* ORIGINAL REVEALS PRESERVED */

nameArea.style.opacity="0";

await sleep(1500);

text.classList.remove(
"show"
);

await sleep(1500);

await reveal(
"Ah..."
);

await reveal(
"We have been expecting you."
);

await reveal(
`Welcome, ${name}`
);

/* TRANSITION TO HERO */

mask.classList.add(
"bright"
);

light.animate(
[
{left:"-100%"},
{left:"150%"}
],
{
duration:3000,
fill:"forwards"
}
);

document.getElementById(
"wrap"
).style.opacity="0";

await sleep(2500);

document.getElementById(
"wrap"
).style.display="none";

hero.style.display=
"flex";

void hero.offsetWidth;

hero.style.opacity=
"1";

updateCountdown();

setInterval(
updateCountdown,
1000
);

}
});

/* FALLING CARDS */

const cardContainer =
document.getElementById(
"cardContainer"
);

const suits =
['♦','♣','♥','♠'];

const values =
['A','K','Q','J','10','9','8','7'];

function spawnCard(
isInitial
){

const card =
document.createElement(
"div"
);

card.className =
"falling-card";
  const mobile =
window.innerWidth < 768;

if(mobile){

card.style.width =
"42px";

card.style.height =
"58px";

}

const suit =
suits[
Math.floor(
Math.random()
*
suits.length
)
];

const value =
values[
Math.floor(
Math.random()
*
values.length
)
];

const isRed =
(
suit==='♥'
||
suit==='♦'
);

card.style.color =
isRed
?
'#b31b1b'
:
'#111111';

card.innerHTML = `
<div class="card-corner corner-top">
<div>${value}</div>
<div>${suit}</div>
</div>

<div class="card-suit">
${suit}
</div>

<div class="card-corner corner-bottom">
<div>${value}</div>
<div>${suit}</div>
</div>
`;

const zIdx =
Math.random();

const translateZ =
Math.floor(
zIdx*400-200
);

const startX =
Math.random()
*
window.innerWidth;

const endX =
startX
+
(
Math.random()*200
-
100
);

const duration =
(
Math.random()*6
+
12
)
-
(
zIdx*2
);

let blurVal = 0;
let opacityVal =
window.innerWidth < 768
? 0.25
: 0.8;

if(
translateZ < -80
){
blurVal = 2.5;
opacityVal = 0.4;
}
else if(
translateZ > 140
){
blurVal = 4;
opacityVal = 0.6;
}

card.style.setProperty(
'--x-start',
`${startX}px`
);

card.style.setProperty(
'--x-end',
`${endX}px`
);

card.style.setProperty(
'--z-depth',
`${translateZ}px`
);

card.style.setProperty(
'--r-start',
`${Math.random()*360}deg`
);

card.style.setProperty(
'--rot-x',
`${Math.random()*180+90}deg`
);

card.style.setProperty(
'--rot-y',
`${Math.random()*180+90}deg`
);

card.style.setProperty(
'--rot-z',
`${Math.random()*90-45}deg`
);

card.style.animationDuration =
`${duration}s`;

card.style.filter =
blurVal > 0
?
`blur(${blurVal}px)`
:
'none';

card.style.opacity =
opacityVal;

if(isInitial){

card.style.animationDelay =
`-${
Math.random()
*
duration
}s`;

}

card.addEventListener(
"animationend",
()=>card.remove()
);

cardContainer.appendChild(
card
);

}

const totalInitialCards =
window.innerWidth < 768
? 10
: 25;

for(
let i=0;
i<totalInitialCards;
i++
){
spawnCard(true);
}

setInterval(
()=>{

if(
cardContainer.children.length
<
totalInitialCards
){
spawnCard(false);
}

},
400
);
  </script>

</body>
</html>
