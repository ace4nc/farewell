<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Velvet Hour</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:'Cinzel',serif;
color:#f5f1e8;
}

/* BACKGROUND */
#bg{
position:fixed;
inset:0;
background:#000;
overflow:hidden;
}

.smoke{
position:absolute;
width:200%;
height:200%;
left:-50%;
top:-50%;
opacity:0;
background:
radial-gradient(circle at 30% 40%, rgba(255,255,255,.05), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(255,255,255,.04), transparent 40%);
animation: smokeReveal 8s forwards, smokeMove 25s infinite ease-in-out;
}

@keyframes smokeReveal{ from{opacity:0;} to{opacity:1;} }

@keyframes smokeMove{
0%{transform:translate(0,0);}
50%{transform:translate(40px,-30px);}
100%{transform:translate(0,0);}
}

/* MASK */
#mask{
position:fixed;
left:50%;
top:40%;
transform:translate(-50%,-50%);
width:min(90vw,900px);
opacity:0;
transition:3s ease;
filter:brightness(1.2) contrast(1.3);
}

#mask.show{opacity:.18;}
#mask.bright{opacity:.9;}

/* INTRO */
#wrap{
position:relative;
z-index:10;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

#text{
font-size:clamp(1.4rem,4vw,2.5rem);
letter-spacing:.08em;
line-height:1.8;
opacity:0;
transition:1.5s;
min-height:200px;
}

#text.show{opacity:1;}

#nameArea{
opacity:0;
transition:1.5s;
margin-top:20px;
}

#nameArea.show{opacity:1;}

#typed{
font-family:'Montserrat',sans-serif;
font-size:1.5rem;
color:#d4d0c7;
letter-spacing:.15em;
}

.cursor{
display:inline-block;
width:2px;
height:1em;
background:#d4d0c7;
animation:blink 1s infinite;
margin-left:4px;
}

@keyframes blink{50%{opacity:0;}}

#input{
position:absolute;
opacity:0;
}

/* HERO */
#hero{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#000;
opacity:0;
visibility:hidden;
transition:2s ease;
z-index:50;
}

#hero.show{
opacity:1;
visibility:visible;
}

.hero-content{
text-align:center;
padding:20px;
}

.farewell-title{
font-size:clamp(3.5rem,14vw,10rem);
letter-spacing:.05em;
}

.class-title{
font-family:'Montserrat',sans-serif;
letter-spacing:.6em;
color:#b89b5f;
margin-top:10px;
}

/* CARDS */
#countdown{
margin-top:40px;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}

.count-card{
width:90px;
height:120px;
border-radius:12px;
background:linear-gradient(145deg,#fff,#e9e9e9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:#111;
box-shadow:0 10px 25px rgba(0,0,0,.5);
position:relative;
}

.count-card::before,
.count-card::after{
content:"♠";
position:absolute;
font-size:.8rem;
opacity:.5;
}

.count-card::before{top:8px;left:10px;}
.count-card::after{bottom:8px;right:10px;transform:rotate(180deg);}

.count-card span{
font-size:2rem;
}

.count-card small{
font-family:'Montserrat',sans-serif;
font-size:.65rem;
letter-spacing:.2em;
color:#333;
margin-top:5px;
}

/* DATE */
.date-note{
margin-top:30px;
font-family:'Montserrat',sans-serif;
font-size:.8rem;
letter-spacing:.2em;
color:#888;
}

.note{
font-size:.6rem;
color:#555;
margin-top:6px;
}

</style>
</head>

<body>

<div id="bg">
<div class="smoke"></div>
<img id="mask" src="mask.png">
</div>

<div id="wrap">
<div>

<div id="text"></div>

<div id="nameArea">
<span id="typed"></span><span class="cursor"></span>
<input id="input" type="text">
</div>

</div>
</div>

<section id="hero">

<div class="hero-content">

<div class="farewell-title">FAREWELL</div>
<div class="class-title">CLASS OF 2026</div>

<div id="countdown">

<div class="count-card"><span id="days">00</span><small>DAYS</small></div>
<div class="count-card"><span id="hours">00</span><small>HOURS</small></div>
<div class="count-card"><span id="minutes">00</span><small>MINS</small></div>
<div class="count-card"><span id="seconds">00</span><small>SECS</small></div>

</div>

<div class="date-note">
<div>AUGUST 2026</div>
<div>09.08.26</div>
<div class="note">date to be confirmed</div>
</div>

</div>

</section>

<script>

const text=document.getElementById("text");
const input=document.getElementById("input");
const typed=document.getElementById("typed");
const nameArea=document.getElementById("nameArea");
const mask=document.getElementById("mask");
const hero=document.getElementById("hero");

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function show(msg,time){
text.innerHTML=msg;
text.classList.add("show");
await sleep(time);
text.classList.remove("show");
await sleep(1200);
}

async function intro(){
await sleep(3000);
await show("An invitation was issued.",5000);
await show("Whether it reached the right hands remains to be seen.",6000);

mask.classList.add("show");

text.innerHTML="Who are you?";
text.classList.add("show");

nameArea.classList.add("show");
input.focus();
}

intro();

input.addEventListener("input",()=>{
typed.textContent=input.value;
});

input.addEventListener("keydown",async e=>{
if(e.key==="Enter"){
const name=input.value.trim();
if(!name)return;

await show("",500);

await show("Ah...",1500);
await show("We have been expecting you.",2000);
await show(`Welcome, ${name}`,2000);

mask.classList.add("bright");

await sleep(1000);

document.getElementById("wrap").style.opacity="0";
await sleep(1500);

hero.classList.add("show");
}
});

/* COUNTDOWN */
const target=new Date("August 9, 2026 18:00:00");

function update(){
const now=new Date();
const d=target-now;

document.getElementById("days").textContent=Math.floor(d/86400000);
document.getElementById("hours").textContent=Math.floor(d%86400000/3600000);
document.getElementById("minutes").textContent=Math.floor(d%3600000/60000);
document.getElementById("seconds").textContent=Math.floor(d%60000/1000);
}

update();
setInterval(update,1000);

</script>

</body>
</html>
