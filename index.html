<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Velvet Hour</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =======================
   BASE
======================= */

body {
margin: 0;
padding: 0;
background: #000;
color: #fff;
font-family: 'Montserrat', sans-serif;
overflow-x: hidden;
}

#wrap {
position: relative;
z-index: 10;
transition: 2.2s ease;
}

/* =======================
   INTRO (YOUR ORIGINAL SYSTEM PRESERVED)
======================= */

#content {
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
flex-direction: column;
text-align: center;
}

#text {
font-size: 1.2rem;
letter-spacing: 2px;
opacity: 0.8;
}

#nameArea {
margin-top: 20px;
}

#input {
background: transparent;
border: none;
border-bottom: 1px solid rgba(255,255,255,0.3);
color: white;
outline: none;
text-align: center;
font-size: 1rem;
margin-top: 10px;
}

.cursor {
display: inline-block;
width: 8px;
height: 20px;
background: white;
margin-left: 5px;
animation: blink 1s infinite;
}

@keyframes blink {
50% { opacity: 0; }
}

/* =======================
   HERO
======================= */

#hero {
position: fixed;
inset: 0;

display: flex;
justify-content: center;
align-items: center;

opacity: 0;
visibility: hidden;

transition: 2.5s ease;

z-index: 25;

background: radial-gradient(circle at center, rgba(40,20,20,.3), #000);
}

#hero.show {
opacity: 1;
visibility: visible;
}

.hero-content {
text-align: center;
max-width: 1200px;
width: 100%;
position: relative;
z-index: 2;
}

.farewell-title {
font-size: clamp(4rem, 18vw, 12rem);
font-weight: 600;
letter-spacing: .04em;
line-height: .9;
color: #f8f3ea;
}

.class-title {
margin-top: 20px;
letter-spacing: .9em;
font-size: clamp(.7rem, 2vw, 1.2rem);
color: #b89b5f;
}

#countdown {
margin-top: 60px;
display: flex;
justify-content: center;
gap: 15px;
flex-wrap: wrap;
}

.count-card {
width: 95px;
height: 120px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
border: 1px solid rgba(201,164,92,.35);
background: rgba(20,20,20,.9);
}

.count-card span {
font-size: 2.3rem;
}

.count-card small {
font-size: .65rem;
letter-spacing: .25em;
color: #c9a45c;
margin-top: 8px;
}

.date-note {
margin-top: 40px;
font-size: .8rem;
letter-spacing: .25em;
opacity: .7;
}

/* =======================
   RESPONSIVE
======================= */

@media(max-width:768px){
.count-card {
width: 80px;
height: 105px;
}
}

</style>
</head>

<body>

<!-- =======================
     INTRO SYSTEM (UNCHANGED STRUCTURE)
======================= -->

<div id="wrap">

<div id="content">

<div id="text"></div>

<div id="nameArea">

<div>
<span id="typed"></span>
<span class="cursor"></span>
</div>

<input id="input" type="text" autocomplete="off">

</div>

</div>

</div>

<!-- =======================
     HERO SECTION
======================= -->

<section id="hero">

<div class="hero-content">

<h1 class="farewell-title">FAREWELL</h1>

<div class="class-title">CLASS OF 2026</div>

<div id="countdown">

<div class="count-card">
<span id="days">00</span>
<small>DAYS</small>
</div>

<div class="count-card">
<span id="hours">00</span>
<small>HOURS</small>
</div>

<div class="count-card">
<span id="minutes">00</span>
<small>MINS</small>
</div>

<div class="count-card">
<span id="seconds">00</span>
<small>SECS</small>
</div>

</div>

<div class="date-note">
<div>AUGUST 2026</div>
<div>09.08.26*</div>
<div>*subject to change</div>
</div>

</div>

</section>

<!-- =======================
     SCRIPT (COUNTDOWN + TRANSITION HOOK)
======================= -->

<script>

/* =======================
   COUNTDOWN
======================= */

const hero = document.getElementById("hero");
const wrap = document.getElementById("wrap");

const targetDate = new Date("August 9, 2026 18:00:00");

function updateCountdown(){

const now = new Date();
const diff = targetDate - now;

if(diff < 0) return;

document.getElementById("days").textContent =
Math.floor(diff / (1000*60*60*24));

document.getElementById("hours").textContent =
Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

document.getElementById("minutes").textContent =
Math.floor((diff % (1000*60*60)) / (1000*60));

document.getElementById("seconds").textContent =
Math.floor((diff % (1000*60)) / 1000);

}

updateCountdown();
setInterval(updateCountdown, 1000);

/* =======================
   TRANSITION FUNCTION (CALL THIS FROM YOUR INTRO LOGIC)
======================= */

function transitionToHero(){

wrap.style.transition = "2.2s ease";
wrap.style.opacity = "0";
wrap.style.filter = "blur(6px)";
wrap.style.transform = "scale(1.02)";

setTimeout(() => {

hero.classList.add("show");

document.body.style.background = "#000";

}, 2200);

}

/* =======================
   EXPOSE FOR YOUR INTRO SCRIPT
   (IMPORTANT: call this after "Welcome, name")
======================= */

window.transitionToHero = transitionToHero;

</script>

</body>
</html>
