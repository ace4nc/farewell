<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Velvet Hour</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
font-family:'Cinzel',serif;
color:#f5f1e8;
}

/* BACKGROUND */

#bg{
position:fixed;
inset:0;
background:#000;
overflow:hidden;
z-index:1;
}

/* SMOKE */

.smoke{
position:absolute;
width:200%;
height:200%;
left:-50%;
top:-50%;
opacity:0;

background:
radial-gradient(circle at 30% 40%,
rgba(255,255,255,.05),
transparent 40%),

radial-gradient(circle at 70% 60%,
rgba(255,255,255,.04),
transparent 40%);

animation:
smokeReveal 8s forwards,
smokeMove 25s infinite ease-in-out;
}

@keyframes smokeReveal{
from{opacity:0;}
to{opacity:1;}
}

@keyframes smokeMove{
0%{transform:translate(0,0);}
50%{transform:translate(40px,-30px);}
100%{transform:translate(0,0);}
}

/* MASK */

#mask{
position:fixed;
left:50%;
top:40%;

transform:
translate(-50%,-50%);

width:min(90vw,900px);

opacity:0;

transition:4s ease;

filter:
brightness(1.2)
contrast(1.3)
drop-shadow(0 0 20px rgba(255,255,255,.2))
drop-shadow(0 0 60px rgba(255,255,255,.05));
}

#mask.show{
opacity:.18;
}

#mask.bright{
opacity:.35;
}

/* CARDS CANVAS OVERLAY */

#cardCanvas{
position:fixed;
inset:0;
z-index:3;
pointer-events:none;
}

/* CONTENT */

#wrap{
position:relative;
z-index:10;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;
text-align:center;
transition:opacity 1.5s ease;
}

#content{
max-width:800px;
width:100%;
}

#text{
font-size:clamp(1.4rem,4vw,2.5rem);
letter-spacing:.08em;
line-height:1.8;
opacity:0;
transition:2s;
min-height:200px;
}

#text.show{
opacity:1;
}

/* NAME */

#nameArea{
opacity:0;
transition:2s;
margin-top:30px;
}

#nameArea.show{
opacity:1;
}

#typed{
font-family:'Montserrat',sans-serif;
font-size:1.6rem;
color:#d4d0c7;
letter-spacing:.15em;
}

.cursor{
display:inline-block;
width:2px;
height:1em;
background:#d4d0c7;
animation:blink 1s infinite;
margin-left:4px;
}

@keyframes blink{
50%{opacity:0;}
}

#input{
position:absolute;
opacity:0;
pointer-events:none;
}

/* LIGHT SWEEP */

#light{
position:fixed;
left:-100%;
top:0;
width:40%;
height:100%;
z-index:2;
background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
transparent
);
transform:skewX(-25deg);
}

/* ========================= */
/* HERO SECTION              */
/* ========================= */

#hero{
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(5,5,5,0.5) 0%, rgba(0,0,0,0.9) 100%);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
z-index:20;

opacity:0;
pointer-events:none;
transition:opacity 2s ease;
}

#hero.show-hero{
opacity:1;
pointer-events:auto;
}

.hero-inner{
width:100%;
max-width:1100px;
}

.title{
font-size:clamp(3rem,10vw,8rem);
letter-spacing:.06em;
margin-bottom:10px;
}

.subtitle{
font-family:'Montserrat',sans-serif;
letter-spacing:.3em;
opacity:.7;
margin-bottom:40px;
}

/* COUNTDOWN */

.countdown{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.card{
width:90px;
height:110px;
background:linear-gradient(180deg,#141414,#050505);
border:1px solid rgba(201,164,92,.4);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:14px;
}

.card span{
font-family:'Montserrat',sans-serif;
font-size:2rem;
}

.card small{
font-size:.65rem;
letter-spacing:.2em;
opacity:.7;
margin-top:5px;
}

.note{
margin-top:35px;
font-size:.8rem;
opacity:.5;
letter-spacing:.2em;
}

</style>
</head>

<body>

<div id="bg">

<div class="smoke"></div>

<img src="mask.png" id="mask">

<div id="light"></div>

<canvas id="cardCanvas"></canvas>

</div>

<div id="wrap">

<div id="content">

<div id="text"></div>

<div id="nameArea">

<div>
<span id="typed"></span>
<span class="cursor"></span>
</div>

<input id="input" type="text" autocomplete="off">

</div>

</div>

</div>

<div id="hero">

<div class="hero-inner">

<div class="title">FAREWELL</div>

<div class="subtitle">CLASS OF 2026</div>

<div class="countdown">

<div class="card"><span id="d">00</span><small>DAYS</small></div>
<div class="card"><span id="h">00</span><small>HOURS</small></div>
<div class="card"><span id="m">00</span><small>MINS</small></div>
<div class="card"><span id="s">00</span><small>SECS</small></div>

</div>

<div class="note">
AUGUST 9
</div>

</div>

</div>

<script>

const text =
document.getElementById("text");

const input =
document.getElementById("input");

const typed =
document.getElementById("typed");

const nameArea =
document.getElementById("nameArea");

const mask =
document.getElementById("mask");

const light =
document.getElementById("light");

const hero =
document.getElementById("hero");

/* COUNTDOWN */

const target =
new Date("August 9, 2026 00:00:00");

function updateCountdown(){

const now =
new Date();

const diff =
target - now;

if(diff <= 0){
document.getElementById("d").textContent = "00";
document.getElementById("h").textContent = "00";
document.getElementById("m").textContent = "00";
document.getElementById("s").textContent = "00";
return;
}

const d =
Math.floor(diff/(1000*60*60*24));

const h =
Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const m =
Math.floor((diff%(1000*60*60))/(1000*60));

const s =
Math.floor((diff%(1000*60))/1000);

document.getElementById("d").textContent = d.toString().padStart(2,'0');
document.getElementById("h").textContent = h.toString().padStart(2,'0');
document.getElementById("m").textContent = m.toString().padStart(2,'0');
document.getElementById("s").textContent = s.toString().padStart(2,'0');

}

/* INTRO */

function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function showLine(message,time){

text.innerHTML = message;
text.classList.add("show");

await sleep(time);

text.classList.remove("show");

await sleep(2500);
}

async function intro(){

await sleep(5000);

await showLine("An invitation was issued.",7000);

await showLine("Whether it reached the right hands remains to be seen.",8000);

mask.classList.add("show");

text.innerHTML = "Who are you?";
text.classList.add("show");

nameArea.classList.add("show");

input.focus();
}

intro();

/* NAME INPUT */

input.addEventListener("input",()=>{
typed.textContent = input.value;
});

/* TRANSITION TO HERO */

input.addEventListener("keydown",async e=>{

if(e.key==="Enter"){

const name = input.value.trim();
if(!name)return;

document.getElementById("wrap").style.opacity="0";

mask.classList.add("bright");

light.animate([
{left:"-100%"},
{left:"150%"}
],{
duration:3000,
fill:"forwards"
});

await sleep(1000);

updateCountdown();
hero.classList.add("show-hero");
setInterval(updateCountdown,1000);

}

});

document.addEventListener("click",()=>input.focus());


/* =================================================== */
/* CINEMATIC FALLING CARDS ENGINE                      */
/* =================================================== */

const canvas =
document.getElementById("cardCanvas");

const ctx =
canvas.getContext("2d");

let width =
canvas.width = window.innerWidth;

let height =
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
width = canvas.width = window.innerWidth;
height = canvas.height = window.innerHeight;
});

const cardSuits =
['♦','♣','♥','♠'];

const cardValues =
['A','K','Q','J','10','9','8'];

function createCardBuffer(suit,value){

const cardBuf =
document.createElement('canvas');

cardBuf.width = 120;
cardBuf.height = 168;

const bCtx =
cardBuf.getContext('2d');

bCtx.fillStyle = '#ffffff';
bCtx.beginPath();

if(typeof bCtx.roundRect === "function"){
bCtx.roundRect(0,0,120,168,[10]);
}else{
bCtx.rect(0,0,120,168);
}
bCtx.fill();

bCtx.strokeStyle = 'rgba(0,0,0,0.15)';
bCtx.lineWidth = 4;
bCtx.stroke();

const isRed =
(suit === '♥' || suit === '♦');

bCtx.fillStyle =
isRed ? '#b31b1b' : '#111111';

bCtx.font = '54px serif';
bCtx.textAlign = 'center';
bCtx.textBaseline = 'middle';
bCtx.fillText(suit,60,84);

bCtx.font = 'bold 20px sans-serif';
bCtx.textAlign = 'left';
bCtx.fillText(value,12,25);
bCtx.fillText(suit,12,48);

bCtx.save();
bCtx.translate(120,168);
bCtx.rotate(Math.PI);
bCtx.fillText(value,12,25);
bCtx.fillText(suit,12,48);
bCtx.restore();

return cardBuf;
}

const preRenderedCards = [];

for(let s of cardSuits){
for(let v of cardValues){
preRenderedCards.push(createCardBuffer(s,v));
}
}

class FallingCard {

constructor(initialDelay = false){
this.reset(initialDelay);
}

reset(initialDelay){
this.img = preRenderedCards[Math.floor(Math.random()*preRenderedCards.length)];
this.x = Math.random()*width;
this.z = Math.random()*0.8+0.2;
this.y = initialDelay ? (Math.random()*-height)-150 : -180;

this.speedY = (Math.random()*1.5+1)*(this.z*1.8);
this.speedX = Math.sin(Math.random()*Math.PI)*0.4;

this.rotation = Math.random()*Math.PI*2;
this.rotSpeed = (Math.random()*0.02-0.01)*1.5;
this.scaleX = 1;
this.flipSpeed = Math.random()*0.03+0.01;

this.blur = this.z < 0.4 ? 3 : (this.z > 0.85 ? 5 : 0);
this.opacity = this.z < 0.4 ? 0.35 : (this.z > 0.85 ? 0.6 : 0.85);
}

update(){
this.y += this.speedY;
this.x += this.speedX;
this.rotation += this.rotSpeed;
this.scaleX = Math.sin(Date.now()*0.001*this.flipSpeed);

if(this.y > height+200){
this.reset(false);
}
}

draw(){
ctx.save();
ctx.translate(this.x,this.y);
ctx.rotate(this.rotation);
ctx.scale(this.scaleX*this.z*0.5,this.z*0.5);
ctx.globalAlpha = this.opacity;

if(this.blur > 0 && typeof ctx.filter === 'string'){
ctx.filter = `blur(${this.blur}px)`;
}

ctx.shadowColor = "rgba(0,0,0,0.6)";
ctx.shadowBlur = 25*this.z;
ctx.shadowOffsetY = 15*this.z;

ctx.drawImage(this.img,-60,-84);
ctx.restore();

if(typeof ctx.filter === 'string'){
ctx.filter = "none";
}
}

}

const deckSize = 38;
const cardDeck = [];

for(let i=0; i<deckSize; i++){
cardDeck.push(new FallingCard(true));
}

function animateScene(){
ctx.clearRect(0,0,width,height);
cardDeck.sort((cardA,cardB)=>cardA.z-cardB.z);

for(let card of cardDeck){
card.update();
card.draw();
}
requestAnimationFrame(animateScene);
}

animateScene();

</script>

</body>
</html>
