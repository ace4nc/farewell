<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Velvet Hour</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

body{
font-family:'Cinzel',serif;
color:#f5f1e8;
}

/* BACKGROUND */

#bg{
position:fixed;
inset:0;
background:#000;
overflow:hidden;
z-index: 1; /* Ensure background stays under content layers */
}

/* SMOKE */

.smoke{
position:absolute;
width:200%;
height:200%;
left:-50%;
top:-50%;
opacity:0;

background:
radial-gradient(circle at 30% 40%,
rgba(255,255,255,.05),
transparent 40%),

radial-gradient(circle at 70% 60%,
rgba(255,255,255,.04),
transparent 40%);

animation:
smokeReveal 8s forwards,
smokeMove 25s infinite ease-in-out;
}

@keyframes smokeReveal{
from{opacity:0;}
to{opacity:1;}
}

@keyframes smokeMove{
0%{transform:translate(0,0);}
50%{transform:translate(40px,-30px);}
100%{transform:translate(0,0);}
}

/* MASK */

#mask{
position:fixed;
left:50%;
top:40%;

transform:
translate(-50%,-50%);

width:min(90vw,900px);

opacity:0;

transition:4s ease;

filter:
brightness(1.2)
contrast(1.3)
drop-shadow(0 0 20px rgba(255,255,255,.2))
drop-shadow(0 0 60px rgba(255,255,255,.05));
}

#mask.show{
opacity:.18;
}

#mask.bright{
opacity:.35; /* Bumped slightly so it stays elegant but visible */
}

/* CONTENT */

#wrap{
position:relative;
z-index:10;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:30px;
text-align:center;
transition: opacity 1.5s ease; /* Added smooth transition rule */
}

#content{
max-width:800px;
width:100%;
}

#text{
font-size:clamp(1.4rem,4vw,2.5rem);
letter-spacing:.08em;
line-height:1.8;
opacity:0;
transition:2s;
min-height:200px;
}

#text.show{
opacity:1;
}

/* NAME */

#nameArea{
opacity:0;
transition:2s;
margin-top:30px;
}

#nameArea.show{
opacity:1;
}

#typed{
font-family:'Montserrat',sans-serif;
font-size:1.6rem;
color:#d4d0c7;
letter-spacing:.15em;
}

.cursor{
display:inline-block;
width:2px;
height:1em;
background:#d4d0c7;
animation:blink 1s infinite;
margin-left:4px;
}

@keyframes blink{
50%{opacity:0;}
}

#input{
position:absolute;
opacity:0;
pointer-events:none;
}

/* LIGHT SWEEP */

#light{
position:fixed;
left:-100%;
top:0;
width:40%;
height:100%;
z-index: 2; /* Keep sweep layer explicitly over background but under hero text */
background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
transparent
);
transform:skewX(-25deg);
}

/* ========================= */
/* HERO SECTION (UPDATED)    */
/* ========================= */

#hero{
position:fixed;
inset:0;
background: radial-gradient(circle at center, rgba(5,5,5,0.4) 0%, rgba(0,0,0,0.85) 100%); /* Allows background smoke to breathe through */
display: flex;
opacity: 0;
pointer-events: none; /* Block interactions until revealed */
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
z-index:20; /* Lowered so it sits elegantly over the original #bg elements */
transition: opacity 2.5s ease; /* Smooth fade-in duration */
}

#hero.reveal {
opacity: 1;
pointer-events: auto;
}

.hero-inner{
width:100%;
max-width:1100px;
}

.title{
font-size:clamp(3rem,10vw,8rem);
letter-spacing:.06em;
margin-bottom:10px;
}

.subtitle{
font-family:'Montserrat',sans-serif;
letter-spacing:.3em;
opacity:.7;
margin-bottom:40px;
}

/* COUNTDOWN */

.countdown{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.card{
width:90px;
height:110px;
background:linear-gradient(180deg,#141414,#050505);
border:1px solid rgba(201,164,92,.4);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:14px;
}

.card span{
font-family:'Montserrat', sans-serif; /* Cleaner display for numbers */
font-size:2rem;
}

.card small{
font-size:.65rem;
letter-spacing:.2em;
opacity:.7;
margin-top:5px;
}

.note{
margin-top:35px;
font-size:.8rem;
opacity:.5;
letter-spacing:.2em;
}

</style>
</head>

<body>

<div id="bg">

<div class="smoke"></div>

<img src="mask.png" id="mask">

<div id="light"></div>

</div>

<div id="wrap">

<div id="content">

<div id="text"></div>

<div id="nameArea">

<div>
<span id="typed"></span>
<span class="cursor"></span>
</div>

<input id="input" type="text" autocomplete="off">

</div>

</div>

</div>

<div id="hero">

<div class="hero-inner">

<div class="title">FAREWELL</div>

<div class="subtitle">CLASS OF 2026</div>

<div class="countdown">

<div class="card"><span id="d">00</span><small>DAYS</small></div>
<div class="card"><span id="h">00</span><small>HOURS</small></div>
<div class="card"><span id="m">00</span><small>MINS</small></div>
<div class="card"><span id="s">00</span><small>SECS</small></div>

</div>

<div class="note">
AUGUST 9, 2026 • subject to change
</div>

</div>

</div>

<script>

const text =
document.getElementById("text");

const input =
document.getElementById("input");

const typed =
document.getElementById("typed");

const nameArea =
document.getElementById("nameArea");

const mask =
document.getElementById("mask");

const light =
document.getElementById("light");

const hero =
document.getElementById("hero");

/* COUNTDOWN WITH FORCES LEADING ZEROS */

const target =
new Date("August 9, 2026 00:00:00");

function updateCountdown(){

const now =
new Date();

const diff =
target - now;

// Fallback in case target date passes
if (diff <= 0) {
document.getElementById("d").textContent = "00";
document.getElementById("h").textContent = "00";
document.getElementById("m").textContent = "00";
document.getElementById("s").textContent = "00";
return;
}

const d =
Math.floor(diff/(1000*60*60*24));

const h =
Math.floor((diff%(1000*60*60*24))/(1000*60*60));

const m =
Math.floor((diff%(1000*60*60))/(1000*60));

const s =
Math.floor((diff%(1000*60))/1000);

// Use padStart to keep numbers looking consistent inside cards
document.getElementById("d").textContent = d.toString().padStart(2, '0');
document.getElementById("h").textContent = h.toString().padStart(2, '0');
document.getElementById("m").textContent = m.toString().padStart(2, '0');
document.getElementById("s").textContent = s.toString().padStart(2, '0');

}

/* KEEP YOUR INTRO EXACT */

function sleep(ms){
return new Promise(r=>setTimeout(r,ms));
}

async function showLine(message,time){

text.innerHTML = message;
text.classList.add("show");

await sleep(time);

text.classList.remove("show");

await sleep(2500);
}

async function intro(){

await sleep(5000);

await showLine("An invitation was issued.",7000);

await showLine("Whether it reached the right hands remains to be seen.",8000);

mask.classList.add("show");

text.innerHTML = "Who are you?";
text.classList.add("show");

nameArea.classList.add("show");

input.focus();
}

intro();

/* NAME INPUT */

input.addEventListener("input",()=>{
typed.textContent = input.value;
});

/* TRANSITION TO HERO */

input.addEventListener("keydown",async e=>{

if(e.key==="Enter"){

const name = input.value.trim();
if(!name)return;

/* fade intro out smoothly using CSS class rule */
document.getElementById("wrap").style.opacity="0";

/* cleanup background feel and update layout state */
mask.classList.add("bright");

// Trigger light sweep simultaneously with the fade out
light.animate([
{left:"-100%"},
{left:"150%"}
],{
duration:3000,
fill:"forwards"
});

await sleep(1200);

/* Reveal hero section via clean opacity transition class */
updateCountdown();
hero.classList.add("reveal");
setInterval(updateCountdown,1000);

}

});

document.addEventListener("click",()=>input.focus());

</script>

</body>
</html>
